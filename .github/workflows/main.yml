name: Run Stock Bot

on:
  schedule:
    # 台灣時間週一至週五 09:50 執行 (國際標準時 UTC 01:50)
    - cron: '50 1 * * 1-5'
  workflow_dispatch: # 讓你可以隨時點擊 Actions 按鈕手動測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance twilio pandas matplotlib requests

      - name: Run Stock Analysis
        env:
          # 這裡必須對應你在 Settings > Secrets 裡設定的名字
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          MY_PHONE: ${{ secrets.MY_PHONE }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: python bot.py
